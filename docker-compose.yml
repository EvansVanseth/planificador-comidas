services:
  postgres:
    image: postgres:16-alpine
    container_name: planificador-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: planificador
      POSTGRES_PASSWORD: planificador
      POSTGRES_DB: planificador
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
